# Build dedicato Windows x64 (manuale). Scarica mpv x64 completo
# (mpv.exe + DLL), lo imbarca come risorsa e produce installer .msi/.exe.
name: Build Windows

on:
  workflow_dispatch:
    inputs:
      brand:
        description: "Brand id (funside, professione-casa, gustracks)"
        default: "funside"
      tauri_args:
        description: "Extra args tauri (es. --config src-tauri/tauri.oneradio.conf.json)"
        default: ""

jobs:
  build:
    runs-on: windows-latest
    name: Build Windows-x64
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: npm ci

      - name: Fetch mpv runtime (Windows x64)
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $dir = "src-tauri/bin"
          $runtime = "$dir/mpv-win"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          New-Item -ItemType Directory -Force -Path $runtime | Out-Null

          # Build x64 ufficiale shinchiro/SourceForge. Non copiare solo mpv.exe:
          # su Windows servono le DLL accanto al binario, altrimenti mpv non crea
          # la pipe IPC e il player resta per sempre in BUFFERING.
          $url = "https://sourceforge.net/projects/mpv-player-windows/files/64bit/mpv-x86_64-20260607-git-71ebd08.7z/download"
          Write-Host "Scarico: $url"
          & curl.exe -L --fail --retry 3 --retry-delay 2 -A "github-actions" -o "mpv-win.7z" $url
          if ($LASTEXITCODE -ne 0) { throw "download mpv fallito: curl exit $LASTEXITCODE" }
          & 7z x "mpv-win.7z" "-ompv-win" -y | Out-Null
          $exe = Get-ChildItem -Path "mpv-win" -Recurse -Filter "mpv.exe" | Select-Object -First 1
          if (-not $exe) { throw "mpv.exe non trovato nell'archivio" }
          Copy-Item "$($exe.Directory.FullName)\*" $runtime -Recurse -Force

          # Mantieni anche il sidecar atteso da externalBin: serve al bundler Tauri.
          # Il runtime reale usato da mpv.rs su Windows è invece bin/mpv-win/mpv.exe.
          Copy-Item $exe.FullName "$dir/mpv-x86_64-pc-windows-msvc.exe" -Force
          $sz = (Get-ChildItem $runtime -Recurse -File | Measure-Object -Property Length -Sum).Sum
          Write-Host "Runtime mpv pronto: $sz byte in $runtime"
          Get-ChildItem $runtime | Select-Object Name, Length | Format-Table -AutoSize

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        with:
          args: ${{ github.event.inputs.tauri_args }}
        env:
          BRAND: ${{ github.event.inputs.brand || 'funside' }}
          PLAYER_API_KEY: ${{ secrets.PLAYER_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: player-windows-x64-${{ github.event.inputs.brand || 'funside' }}
          path: |
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.msi
          retention-days: 14
