<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FunSide Radio</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
  <div id="app">

    <!-- Header -->
    <div class="header" data-tauri-drag-region>
      <div class="header-left">
        <button class="traffic-btn close-btn" id="btnClose" title="Chiudi"></button>
        <button class="traffic-btn mini-btn"  id="btnMini"  title="Minimizza"></button>
        <button class="icon-btn" id="btnSettings" title="Impostazioni">⚙</button>
      </div>
      <div class="header-brand" data-tauri-drag-region>
        <img  id="brandLogo" class="brand-logo" src="" alt="" hidden draggable="false"/>
        <span id="brandName" class="brand-name"></span>
      </div>
    </div>

    <!-- Cover 260×260 -->
    <div class="cover-wrap" id="coverWrap">
      <img id="coverImg" src="" alt="cover" hidden draggable="false"/>
      <div class="cover-fallback" id="coverFallback">
        <span id="fallbackName"></span>
        <span class="live-tag">LIVE STREAM</span>
      </div>
    </div>

    <!-- Now playing -->
    <div class="now-playing">
      <span class="status-dot" id="statusDot"></span>
      <span class="status-label" id="statusLabel">IN ATTESA</span>
    </div>
    <div class="track-title"  id="trackTitle">ON AIR</div>
    <div class="track-artist" id="trackArtist"></div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn-play" id="btnPlay">▶</button>
      <button class="btn-stop" id="btnStop">■</button>
      <div class="vol-wrap">
        <span class="vol-label">VOL</span>
        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8"/>
      </div>
    </div>

    <!-- Equalizer canvas -->
    <div class="eq-wrap">
      <canvas id="eqCanvas" width="300" height="52"></canvas>
    </div>

    <!-- ── Settings panel ──────────────────────────────────────────────────────── -->
    <div class="panel" id="settingsPanel" hidden>
      <div class="panel-header">
        <span>Impostazioni</span>
        <button class="panel-close" id="btnSettingsClose">✕</button>
      </div>
      <div class="panel-body">

        <label>STREAM URL</label>
        <input type="text" id="streamUrlInput" placeholder="https://..."/>
        <button id="btnSaveSettings">Riconnetti</button>

        <!-- Dev — visibile solo con Ctrl+Shift+D -->
        <div id="devPanel" hidden>
          <hr/>
          <label style="color:#E5A820">⚙ DEV — BRAND OVERRIDE</label>
          <div class="cselect" id="brandSelectWrap">
            <button class="cselect-btn" id="brandSelectBtn" type="button">
              <span id="brandSelectLabel">Funside Radio</span>
              <span class="cselect-arrow">›</span>
            </button>
            <ul class="cselect-list" id="brandSelectList" hidden>
              <li class="cselect-opt" data-value="funside">Funside Radio</li>
              <li class="cselect-opt" data-value="professione-casa">One Radio</li>
              <li class="cselect-opt" data-value="gustracks">GUSTracks</li>
            </ul>
          </div>
          <button id="btnSaveBrand">Cambia brand e ricarica</button>
        </div>

        <hr/>

        <label>LOGO BRAND</label>
        <span id="logoStatus" class="mono hint">—</span>
        <label>FALLBACK COVER</label>
        <div class="row-pair">
          <button id="btnPickFallback">Scegli immagine…</button>
          <span id="fallbackFileStatus" class="mono hint">—</span>
        </div>
        <input type="file" id="fileFallback" accept="image/png,image/jpeg,image/webp" style="display:none"/>

        <hr/>

        <label>CACHE COVER</label>
        <div class="row-pair">
          <span id="cacheInfo" class="mono hint">…</span>
          <button id="btnClearCache">Svuota</button>
        </div>

        <hr/>

        <label>TELEMETRIA</label>
        <div class="tele-row">
          <span class="status-dot" id="teleStatusDot"></span>
          <span id="teleStatusLabel" class="mono hint">non registrato</span>
        </div>
        <div class="row-pair">
          <button id="btnTeleHealth">Controlla health</button>
          <button id="btnTeleRegister">Ri-registra</button>
        </div>

        <hr/>

        <label>VERSIONE</label>
        <span id="installedVersion" class="mono">—</span>
        <button id="btnShowLog">Log eventi</button>

      </div>
    </div>

    <!-- ── Log panel ───────────────────────────────────────────────────────────── -->
    <div class="panel log-panel" id="logPanel" hidden>
      <div class="panel-header">
        <span>Log eventi</span>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="btnCopyLogInPanel" style="font-size:10px;padding:4px 8px">Copia</button>
          <button class="panel-close" id="btnLogClose">✕</button>
        </div>
      </div>
      <div class="log-body" id="logBody"></div>
      <div class="log-footer">
        <span id="playerUuid" class="mono"></span>
        <span id="brandLabel"  class="mono"></span>
      </div>
    </div>

    <!-- ── Health modal ─────────────────────────────────────────────────────────── -->
    <div class="modal-overlay" id="healthModal" hidden>
      <div class="modal-box">
        <div class="modal-header">
          <span>Health check</span>
          <button class="panel-close" id="btnHealthModalClose">✕</button>
        </div>
        <div class="modal-body" id="healthResult">…</div>
      </div>
    </div>

  </div>

  <audio id="audioEl" preload="none"></audio>
  <!-- pulsante copia log nascosto (usato da JS) -->
  <button id="btnCopyLog" style="display:none"></button>
  <span id="installedVersionHidden" style="display:none"></span>
  <script type="module" src="main.js"></script>
</body>
</html>
